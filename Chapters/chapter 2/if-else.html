<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if/else</title>
</head>
<body>
    <script>
       console.log("Checking the Age of a Person")
       let age=19;
       if (age>=18){
        console.log("You are eligible for driving")
       }
       else if(age<18){
        console.log("You are not eligible for driving instead use a cycle to travel wih helmet")
       }
       else{
        console.log("You are entering invalid credentials")
       }
    </script>
</body>
</html>
