<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Myntra wishlist</title><style>
        .borderless{

            border: none;
            background-color: rgb(104, 228, 141);border-radius: 100px;
            padding: 6px 16px 6px 16px;
        }
        .wishlist{
            border: 2px solid black;
            border-radius: 6px;
            padding-right:26px  ; padding-left:26px ;
        }
    </style>
</head>
<body>
    <main>
        <button class="borderless" onclick="cartQuantity+=1;
         document.querySelector('#cart-summary').innerText=`Your Bag has ${cartQuantity} items`;">Add to Bag</button>
        

        <button class="wishlist" onclick="cartQuantity-=1; document.querySelector('#cart-summary').innerText=`Your Bag has ${cartQuantity} items`;"
        >MOVE TO WISHLIST</button>

        <button class="borderless"onclick="cartQuantity+=2; document.querySelector('#cart-summary').innerText=`Your Bag has ${cartQuantity} items`;">Add 1+1 sale item</button>

        <h1 id="cart-summary"></h1>
    </main>
    <script >
    let cartQuantity=0;
    document.querySelector('#cart-summary').innerText=`Your Bag has ${cartQuantity} items`;


        
    </script>

</body>
</html>
